[pytest]
addopts = -n auto --reruns 1 --html=reports/report.html --self-contained-html
testpaths = tests
python_files = test_*.py
markers =
    login: Login page scenarios
    inventory: Inventory and product tests
    cart: Cart page interactions
    checkout: End-to-end checkout flow
    api: API-level HTTP tests
    smoke: Critical path — run on every commit
    regression: Full regression suite — run nightly
    slow: Tests that take longer than 10 seconds
    low: Low severity / cosmetic tests